<!DOCTYPE html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Pixelify+Sans:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
    }

    body {
        font-family: "Montserrat", sans-serif;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: #18191dff;
    }

    .Div2 {
        color: white;
        font-size: 20px;
    }

    .Div3 {
        font-size: 40px;
    }

    .btn {
        font-family: "Montserrat", sans-serif;
        padding: 11px 30px;
        border: none;
        border-radius: 10px;
        color: white;
        background: #d6a07cff;
        font-size: 30px;
    }

    .btn2 {
        font-family: "Montserrat", sans-serif;
        padding: 11px 30px;
        border: none;
        border-radius: 10px;
        color: white;
        background: #24A1DE;
        font-size: 30px;
    }

    #slider {
        position: relative;
        text-align: center;
        top: 10px;
    }

    #slider{ 
        margin: 0 auto;
    }

    #slides article{ 
        width: 20%;
        float: left;
    }

    #slides .image{ 
        width: 500%;
        line-height: 0;
    }

    #overflow{
        width: 100%;
        overflow: hidden;
    }

    article img{ 
        width: 100%;
    }

    #desktop:checked ~ #slider{ 
        max-width: 960px; 
    }

    #switch1:checked ~ #controls label:nth-child(3), 
    #switch2:checked ~ #controls label:nth-child(1),
    #switch3:checked ~ #controls label:nth-child(2){
        background: url('Влево.png') no-repeat;
        float: left;
        margin: -50px 0 0 -100px;
        display: block;
        height: 68px;
        width: 68px;
    }

    #switch1:checked ~ #controls label:nth-child(2), 
    #switch2:checked ~ #controls label:nth-child(3),
    #switch3:checked ~ #controls label:nth-child(1){
        background: url('Вправо.png') no-repeat; 
        float: right;
        margin: -50px -100px 0 0;
        display: block;
        height: 68px;
        width: 68px;
    }

    label, a{ 
        cursor: pointer;
    }

    .all input{ 
        display: none;
    }

    #switch1:checked ~ #slides .image{
        margin-left: 0;
    }

    #switch2:checked ~ #slides .image{
        margin-left: -100%;
    }

    #switch3:checked ~ #slides .image{
        margin-left: -200%;
    }

    #controls{ 
        margin: -25% 0 0 0;
        width: 100%;
        height: 50px;
    }

    #active label{ 
        border-radius: 10px; 
        display: inline-block; 
        width: 15px;
        height: 15px;
        background: #ffffff;
    }

    #active{ 
        margin: 23% 0 0;
        text-align: center;
    }

    #active label:hover{ 
        background: #000000;
        border-color: #ffffff !important;
    }

    #switch1:checked ~ #active label:nth-child(1),
    #switch2:checked ~ #active label:nth-child(2),
    #switch3:checked ~ #active label:nth-child(3){
        background: #000000;
        border-color: #000000 !important;
    }

    #slides .image{ 
        transition: all 800ms cubic-bezier(0.770, 0.000, 0.175, 1.000);
    }

    #controls label:hover{ 
        opacity: 0.6;
    }

    #controls label{
        transition: opacity 0.2s ease-out;
    }
</style>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Главная</title>
        <link rel="icon" href="favicon.ico" type="image/x-icon">
    </head>

        <br>
        <div class="Div2">

            <img width="190px" src='logo.png' alt='image'>
            <br>
            <p>Здесь ты можешь скачать проект GradeCalc</p>
            <br>
            <p><strong>GradeCalc</strong> - это специальный калькулятор, чтобы вы могли расчитать свой средний балл исходя ваших оценок</p>
            <br>
            <div class="all">
                <input checked type="radio" name="respond" id="desktop">
                    <article id="slider">
                            <input checked type="radio" name="slider" id="switch1">

                            <input type="radio" name="slider" id="switch3">
                        <div id="slides">
                            <div id="overflow">
                                <div class="image">
                                    <article><img width="38%" src="1.2.png"></article>
                                    <article><img width="38%" src="1.0.png"></article>

                            <label for="switch1"></label>

                        <div id="active">
                            <label for="switch1"></label>

                        </div>
                </article>
            </div>
            <br>
            <p>*Для Android</p>
            <br>
            <a href="download.html" target="_blank"><button class="btn">Скачать</button></a></br>
            <br>
            <a href="https://t.me/GradeCalc" target="_blank"><button class="btn2">Telegram</button></a>
        </div>
    </body>
</html>
